---
- name: Create sonar user
  ansible.builtin.user:
    name: "{{ sonarqube_db_user }}"
    system: yes
    shell: /bin/bash

- name: Install PostgreSQL (for SonarQube)
  ansible.builtin.dnf:
    name: postgresql-server
    state: present

- name: Install PostgreSQL Python dependencies
  ansible.builtin.dnf:
    name: python3-psycopg2
    state: present

- name: Initialize PostgreSQL
  ansible.builtin.command: postgresql-setup --initdb
  args:
    creates: /var/lib/pgsql/data/PG_VERSION

- name: Start and enable PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Allow password auth for SonarQube database user via local socket
  ansible.builtin.lineinfile:
    path: /var/lib/pgsql/data/pg_hba.conf
    insertbefore: '^local\s+all\s+all'
    line: "local   {{ sonarqube_db_name }}   {{ sonarqube_db_user }}                                md5"
  notify: Restart PostgreSQL

- name: Allow password auth for SonarQube database user over IPv4 localhost
  ansible.builtin.lineinfile:
    path: /var/lib/pgsql/data/pg_hba.conf
    insertbefore: '^host\s+all\s+all\s+127\.0\.0\.1/32'
    line: "host    {{ sonarqube_db_name }}   {{ sonarqube_db_user }}   127.0.0.1/32                 md5"
  notify: Restart PostgreSQL

- name: Allow password auth for SonarQube database user over IPv6 localhost
  ansible.builtin.lineinfile:
    path: /var/lib/pgsql/data/pg_hba.conf
    insertbefore: '^host\s+all\s+all\s+::1/128'
    line: "host    {{ sonarqube_db_name }}   {{ sonarqube_db_user }}   ::1/128                      md5"
  notify: Restart PostgreSQL

- name: Apply pending PostgreSQL authentication changes
  ansible.builtin.meta: flush_handlers

- name: Create SonarQube PostgreSQL user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ sonarqube_db_user }}"
    password: "{{ vault_sonar_db_password }}"
    state: present
  no_log: true

- name: Create SonarQube database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ sonarqube_db_name }}"
    owner: "{{ sonarqube_db_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8

- name: Create Sonar directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sonarqube_db_user }}"
    group: "{{ sonarqube_db_user }}"
    mode: '0755'
  loop:
    - "{{ sonarqube_base_dir }}"
    - "{{ sonarqube_install_dir }}"
    - "{{ sonarqube_data_dir }}"

- name: Download SonarQube
  ansible.builtin.get_url:
    url: "https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-{{ sonarqube_version }}.zip"
    dest: "/tmp/sonarqube-{{ sonarqube_version }}.zip"
    mode: '0755'

- name: Extract SonarQube
  ansible.builtin.unarchive:
    src: "/tmp/sonarqube-{{ sonarqube_version }}.zip"
    dest: "{{ sonarqube_base_dir }}"
    remote_src: yes
    creates: "{{ sonarqube_install_dir }}/conf/sonar.properties"
  notify: Restart SonarQube

- name: Set SonarQube ownership
  ansible.builtin.file:
    path: "{{ sonarqube_base_dir }}"
    owner: "{{ sonarqube_db_user }}"
    group: "{{ sonarqube_db_user }}"
    recurse: yes

- name: Configure SonarQube properties
  ansible.builtin.lineinfile:
    path: "{{ sonarqube_install_dir }}/conf/sonar.properties"
    regexp: "^#?{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: 'sonar.jdbc.username', value: "{{ sonarqube_db_user }}" }
    - { key: 'sonar.jdbc.password', value: "{{ vault_sonar_db_password }}" }
    - { key: 'sonar.jdbc.url', value: "jdbc:postgresql://localhost:5432/{{ sonarqube_db_name }}" }
    - { key: 'sonar.web.port', value: "{{ sonarqube_port }}" }
  notify: Restart SonarQube
  no_log: true

- name: Create SonarQube systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/sonarqube.service
    content: |
      [Unit]
      Description=SonarQube service
      After=network.target postgresql.service

      [Service]
      Type=forking
      ExecStart={{ sonarqube_install_dir }}/bin/linux-x86-64/sonar.sh start
      ExecStop={{ sonarqube_install_dir }}/bin/linux-x86-64/sonar.sh stop
      User={{ sonarqube_db_user }}
      Restart=on-failure
      LimitNOFILE=65536
      LimitNPROC=4096

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart SonarQube

- name: Start and enable SonarQube
  ansible.builtin.systemd:
    name: sonarqube
    state: started
    enabled: yes
    daemon_reload: yes

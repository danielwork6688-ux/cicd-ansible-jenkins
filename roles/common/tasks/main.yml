---
- name: Update all packages
  dnf:
    name: '*'
    state: latest
    update_cache: yes

- name: Install common packages
  dnf:
    name:
      - git
      - wget
      - curl
      - unzip
      - tar
      - java-17-openjdk
      - java-17-openjdk-devel
      - python3
      - python3-pip
    state: present

- name: Set JAVA_HOME
  lineinfile:
    path: /etc/environment
    line: 'JAVA_HOME=/usr/lib/jvm/java-17-openjdk'
    create: yes
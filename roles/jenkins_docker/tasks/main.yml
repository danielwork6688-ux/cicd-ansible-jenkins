---
- name: Install Docker dependencies
  ansible.builtin.dnf:
    name:
      - dnf-utils
      - device-mapper-persistent-data
      - lvm2
    state: present

- name: Add Docker CE repository
  ansible.builtin.command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install Docker CE
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Start and enable Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Download Jenkins WAR file
  ansible.builtin.get_url:
    url: "https://get.jenkins.io/war-stable/{{ jenkins_version }}/jenkins.war"
    dest: "{{ jenkins_war_path }}"
    mode: '0755'
  notify: Restart Jenkins

- name: Create Jenkins systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/jenkins.service
    content: |
      [Unit]
      Description=Jenkins Service
      After=network.target

      [Service]
      Type=simple
      User={{ ansible_user }}
      Environment="JAVA_HOME={{ java_home }}"
      ExecStart=/usr/bin/java -jar {{ jenkins_war_path }} --httpPort={{ jenkins_http_port }}
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart Jenkins

- name: Start and enable Jenkins
  ansible.builtin.systemd:
    name: jenkins
    state: started
    enabled: yes
    daemon_reload: yes
